baseURL = "https://guillaumegustin.com/"
theme = "raditian-free-hugo-theme"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

# Configuration pour le traitement des images
[imaging]
  resampleFilter = "lanczos"
  quality = 90
  anchor = "smart"

  # Formats d'images modernes
  [imaging.exif]
    disableDate = true
    disableLatLong = true
    includeFields = ""
    excludeFields = ""

  # Configuration pour WebP et AVIF
  [imaging.webp]
    quality = 85

  [imaging.avif]
    quality = 80

# Plugins
[params.plugins]

  # CSS Plugins
  [[params.plugins.css]]
  URL = "css/main.css"
  [[params.plugins.css]]
  URL = "css/rad-icons.css"
  [[params.plugins.css]]
  URL = "css/custom.css"

  # JS Plugins - loaded via base-foot.html partial

# Multilingual navigation
[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    languageCode = "en"
    title = "Guillaume Gustin - Full-Stack Developer & Biomedical Engineer | Brussels"

    [languages.en.params.seo]
      description = "Full-Stack Developer and Biomedical Engineer based in Belgium. I help mission-driven organizations build effective, sustainable digital solutions — from healthcare platforms to web applications."
      author = "Guillaume Gustin"
      og_image = "img/who-am-i/avatar_mini.webp"

    [languages.en.params.footer]
      copyright = "© Guillaume Gustin. All rights reserved."

    [[languages.en.menu.header]]
      name = "About"
      URL = "#about"
      weight = 2
    [[languages.en.menu.header]]
      name = "Education"
      URL = "#education"
      weight = 3
    [[languages.en.menu.header]]
      name = "Experience"
      URL = "#experience"
      weight = 4
    [[languages.en.menu.header]]
      name = "Publications"

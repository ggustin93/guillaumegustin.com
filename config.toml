  [languages.fr]
    languageName = "Français"
    weight = 2
    languageCode = "fr-be"
    title = "Guillaume Gustin - Développeur Full-Stack & Ingénieur Biomédical | Bruxelles"

    [languages.fr.params.seo]
      description = "Développeur Full-Stack et Ingénieur Biomédical basé en Belgique. J'accompagne les organisations à impact dans la création de solutions numériques efficaces et durables — des plateformes de santé aux applications web."
      author = "Guillaume Gustin"
      og_image = "img/who-am-i/avatar_mini.webp"

    [languages.fr.params.footer]
      copyright = "© Guillaume Gustin. Tous droits réservés."

    [[languages.fr.menu.header]]
      name = "À propos"

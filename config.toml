[params]

  sections = ["showcase", "about", "tech-stack", "education", "experience", "publications", "client-and-work", "testimonial", "blog", "contact", "newsletter"]

  googleTagManagerID = "" # Google Analytics works with Google Tag Manager

  [params.meta_img]
    URL = "img/who-am-i/avatar_mini.webp"

  [params.logo]
    text1 = "Guillaume"
    text2 = "Gustin"

  [params.footer.radity_logo]
    x = "img/general/design-and-code-radity.png"
    _2x = "img/general/design-and-code-radity@2x.png"
    alt = "Design & Code - Radity"

# Activation du sitemap
[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

name: Astro Build Check

on:
  push:
    branches: [main, redesign/**]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (astro/)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: astro/package-lock.json

      - name: Install dependencies
        working-directory: astro
        run: npm ci

      - name: Build
        working-directory: astro
        run: npm run build

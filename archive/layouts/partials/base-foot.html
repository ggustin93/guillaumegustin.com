  var fontB = new w.FontFaceObserver("Inter", { weight: 600 });

/* Vanilla navbar toggle (replaces jQuery + Bootstrap.js) */
document.addEventListener("DOMContentLoaded", function() {
  var toggler = document.querySelector('.navbar-toggler');
  var collapse = document.querySelector('.navbar-collapse');
  var header = document.getElementById('header');
  if (toggler && collapse) {
    toggler.addEventListener('click', function() {
      var isOpen = collapse.classList.contains('show');
      collapse.classList.toggle('show');
      if (header) header.classList.toggle('show');
      toggler.setAttribute('aria-expanded', String(!isOpen));
    });
  }
  /* Close mobile menu on nav link click */
  var navLinks = document.querySelectorAll('a.nav-link');
  navLinks.forEach(function(link) {
    link.addEventListener('click', function() {
      if (collapse && collapse.classList.contains('show')) {
        collapse.classList.remove('show');
        if (header) header.classList.remove('show');
        if (toggler) toggler.setAttribute('aria-expanded', 'false');
      }
    });
  });
});

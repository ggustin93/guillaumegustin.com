<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__left">
      <div class="footer__copy">
        {{ .Site.Params.footer.copyright }} <span class="footer__theme">· Theme by <a href="https://github.com/radity/raditian-free-hugo-theme" target="_blank" rel="noopener">Raditian</a></span>
      </div>
    </div>
    <div class="footer__links">
      <nav aria-label="Footer navigation">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{{ .Site.BaseURL | absURL }}">HOME</a>
          </li>
          {{ range .Site.Menus.footer }}
          <li class="nav-item">
            <a class="nav-link" href="{{ .URL | absURL }}">{{ .Name | upper }}</a>
          </li>
          {{ end }}
        </ul>
      </nav>
    </div>
    <div class="footer__right">
      <a href="https://www.websitecarbon.com/website/guillaumegustin-com/" target="_blank" rel="noopener noreferrer" class="footer__carbon">
        <span aria-hidden="true">🌱</span> Site écoresponsable
      </a>
    </div>
  </div>
</footer>

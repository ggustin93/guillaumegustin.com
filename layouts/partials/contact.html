{{ if .Site.Data.homepage.contact.enable }}
<section id="contact" class="section section--contact pt-0" aria-labelledby="contact-heading">
    <div class="container">
        <div class="contact">
            <h2 id="contact-heading" class="contact-title">{{ .Site.Data.homepage.contact.title }}</h2>
            {{ with .Site.Data.homepage.contact.subtitle }}
            <p class="lead">{{ . }}</p>
            {{ end }}
            <div class="row pt-2">
                <div class="col-12 col-lg-7">
                    <form action="{{ .Site.Data.homepage.contact.form.action }}" method="{{ .Site.Data.homepage.contact.form.method }}" aria-label="Contact form">
                        <div class="row">
                            <div class="col-12 col-sm-6">
                                <label id="full_name_label" class="sr-only" for="full_name">{{ .Site.Data.homepage.contact.form.full_name }}</label>
                                <input type="text" name="name" id="full_name"
                                       placeholder="{{ .Site.Data.homepage.contact.form.full_name }}"
                                       required
                                       autocomplete="name"
                                       aria-required="true"/>
                            </div>
                            <div class="col-12 col-sm-6">
                                <label id="email_label" class="sr-only" for="email">{{ .Site.Data.homepage.contact.form.email }}</label>
                                <input type="email" name="_replyto" id="email"
                                       placeholder="{{ .Site.Data.homepage.contact.form.email }}"
                                       required
                                       autocomplete="email"
                                       aria-required="true"/>
                            </div>
                        </div>
                        <div class="row pt-4">
                            <div class="col-12">
                                <label id="message_label" class="sr-only" for="message">{{ .Site.Data.homepage.contact.form.message }}</label>
                                <textarea name="message" id="message"
                                          cols="30" rows="3"
                                          placeholder="{{ .Site.Data.homepage.contact.form.message }}"
                                          required
                                          aria-required="true"></textarea>
                            </div>
                        </div>
                        <div class="row pt-4">
                            <div class="col-12">
                                <button type="submit" class="btn {{ .Site.Data.homepage.contact.button.class }}">
                                    <i class="{{ .Site.Data.homepage.contact.button.icon }}" aria-hidden="true"></i>
                                    {{ .Site.Data.homepage.contact.button.btnText }}
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="col-12 col-lg-5 contact__info">
                    <h4>Contact</h4>

                    <!-- Contact options with icons -->
                    <div class="contact-list" role="list">
                        <!-- Calendar - Schedule a call -->
                        <div class="contact-item" role="listitem">
                            <a href="https://cal.com/pwablo/30min" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="Schedule a call via Google Calendar">
                                <span class="contact-icon red" aria-hidden="true">
                                    <img src="https://cdn.simpleicons.org/googlecalendar/e05d44" alt="" style="width: 18px; height: 18px; vertical-align: middle;">
                                </span>
                                <span class="contact-text">Schedule a call</span>
                            </a>
                        </div>

                        <!-- WhatsApp -->
                        <div class="contact-item" role="listitem">
                            <a href="https://api.whatsapp.com/send/?phone=32456617260&text&type=phone_number&app_absent=0" target="_blank" rel="noopener noreferrer" class="contact-link" aria-label="Contact via WhatsApp">
                                <span class="contact-icon red" aria-hidden="true">
                                    <img src="https://cdn.simpleicons.org/whatsapp/e05d44" alt="" style="width: 18px; height: 18px; vertical-align: middle;">
                                </span>
                                <span class="contact-text">WhatsApp</span>
                            </a>
                        </div>

                        <!-- Phone -->
                        <div class="contact-item" role="listitem">
                            <a href="tel:+32456617260" class="contact-link" aria-label="Call +32 456 61 72 60">
                                <i class="icon-phone-line contact-icon red" aria-hidden="true"></i>
                                <span class="contact-text">+32 456 61 72 60</span>
                            </a>
                        </div>

                        <!-- Email -->
                        <div class="contact-item" role="listitem">
                            <a href="mailto:guillaume.gustin.9@gmail.com" class="contact-link" aria-label="Send email to guillaume.gustin.9@gmail.com">
                                <i class="icon-mail-fill contact-icon red" aria-hidden="true"></i>
                                <span class="contact-text">guillaume.gustin.9@gmail.com</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{{ end }}

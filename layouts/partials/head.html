{{ $d := (index .Site.Data .Site.Language.Lang).homepage }}
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta http-equiv="X-UA-Compatible" content="ie=edge"/>

<!-- Primary Meta Tags -->
<title>{{ $d.head.title }}</title>
<meta name="title" content="{{ $d.head.title }}"/>
<meta name="description" content="{{ .Site.Params.seo.description }}"/>
<meta name="author" content="{{ .Site.Params.seo.author }}"/>
<link rel="canonical" href="{{ .Permalink }}"/>

<!-- Hreflang for multilingual SEO -->
<link rel="alternate" hreflang="en" href="{{ .Site.BaseURL }}"/>
<link rel="alternate" hreflang="fr" href="{{ .Site.BaseURL }}fr/"/>
<link rel="alternate" hreflang="x-default" href="{{ .Site.BaseURL }}"/>

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website"/>
<meta property="og:url" content="{{ .Permalink }}"/>
<meta property="og:title" content="{{ $d.head.title }}"/>
<meta property="og:description" content="{{ .Site.Params.seo.description }}"/>
<meta property="og:image" content="{{ .Site.Params.seo.og_image | absURL }}"/>
<meta property="og:locale" content="{{ if eq .Site.Language.Lang "fr" }}fr_BE{{ else }}en_US{{ end }}"/>
<meta property="og:site_name" content="{{ .Site.Params.seo.author }}"/>

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:url" content="{{ .Permalink }}"/>
<meta name="twitter:title" content="{{ $d.head.title }}"/>
<meta name="twitter:description" content="{{ .Site.Params.seo.description }}"/>
<meta name="twitter:image" content="{{ .Site.Params.seo.og_image | absURL }}"/>

<!-- JSON-LD Structured Data - Person -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "Guillaume Gustin",
  "url": "{{ .Site.BaseURL }}",
  "image": "{{ .Site.Params.seo.og_image | absURL }}",
  "jobTitle": {{ if eq .Site.Language.Lang "fr" }}"Développeur Full-Stack"{{ else }}"Full-Stack Developer"{{ end }},
  "description": "{{ .Site.Params.seo.description }}",
  "email": "hello@pwablo.be",
  "telephone": "+32456617260",
  "sameAs": [
    "https://www.linkedin.com/in/guillaume-gustin/",
    "https://scholar.google.fr/citations?user=PaToxwcAAAAJ"
  ],
  "alumniOf": [
    {
      "@type": "EducationalOrganization",
      "name": "Louvain School of Engineering (UCLouvain)"
    },
    {
      "@type": "EducationalOrganization",
      "name": "MIT Global Startup Labs"
    }
  ],
  "knowsAbout": ["React", "Angular", "Python", "Node.js", "PostgreSQL", "Firebase", "Ionic", "Sustainable Web Design"],
  "worksFor": {
    "@type": "Organization",
    "name": "Pwablo",
    "url": "https://www.pwablo.be/"
  }
}
</script>

<!-- JSON-LD Structured Data - WebSite -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "{{ $d.head.title }}",
  "url": "{{ .Site.BaseURL }}",
  "description": "{{ .Site.Params.seo.description }}",
  "inLanguage": ["en", "fr"]
}
</script>

<!-- Umami Analytics -->
<script defer src="https://cloud.umami.is/script.js" data-website-id="ef9ecdfc-e05f-4030-b00f-dfc46675b6de"></script>

<!-- Google Tag Manager -->
{{ if .Site.Params.googleTagManagerID }}
<script>
    (function (w, d, s, l, i) {
        w[l] = w[l] || [];
        w[l].push({
            'gtm.start': new Date().getTime(),
            event: 'gtm.js'
        });
        var f = d.getElementsByTagName(s)[0],
            j = d.createElement(s),
            dl = l != 'dataLayer' ? '&l=' + l : '';
        j.async = true;
        j.src =
            'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
        f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', '{{ .Site.Params.googleTagManagerID }}');
</script>
{{ end }}

<style>
    /* Fade In animation triggering after font load or 3s timeout */
    .rad-fade-in {
        will-change: opacity, transform;
        animation-name: rad-fade-in-fallback;
        animation-duration: 5s;
        animation-fill-mode: both;
    }

    @keyframes rad-fade-in-fallback {
        0% {
            opacity: 0;
        }

        75% {
            opacity: 0;
        }

        100% {
            opacity: 1;
        }
    }

    .fonts-loaded .rad-fade-in.rad-waiting {
        animation-name: none;
        opacity: 0;
    }

    .fonts-loaded .rad-fade-in.rad-animate {
        animation-name: rad-fade-in;
        animation-duration: 1.1s;
        animation-fill-mode: both;
    }

    @keyframes rad-fade-in {
        0% {
            opacity: 0;
        }

        100% {
            opacity: 1;
        }
    }

    /* Fade In Long animation triggering after font load or 3s timeout */
    .rad-fade-in-long {
        will-change: opacity, transform;
        animation-name: rad-fade-in-long-fallback;
        animation-duration: 8s;
        animation-fill-mode: both;
    }

    @keyframes rad-fade-in-long-fallback {
        0% {
            opacity: 0;
        }

        75% {
            opacity: 0;
        }

        100% {
            opacity: 1;
        }
    }

    .fonts-loaded .rad-fade-in-long.rad-waiting {
        animation-name: none;
        opacity: 0;
    }

    .fonts-loaded .rad-fade-in-long.rad-animate {
        animation-name: rad-fade-in-long;
        animation-duration: 2s;
        animation-fill-mode: both;
    }

    @keyframes rad-fade-in-long {
        0% {
            opacity: 0;
        }

        20% {
            opacity: 0;
        }

        100% {
            opacity: 1;
        }
    }

    /* Fade Down animation triggering after font load or 3s timeout */
    .rad-fade-down {
        will-change: opacity, transform;
        animation-name: rad-fade-down-fallback;
        animation-duration: 5s;
        animation-fill-mode: both;
        transform: translateY(-30px);
    }

    @keyframes rad-fade-down-fallback {
        0% {
            opacity: 0;
            transform: translateY(-30px);
        }

        75% {
            opacity: 0;
            transform: translateY(-30px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .fonts-loaded .rad-fade-down.rad-waiting {
        animation-name: none;
        opacity: 0;
        transform: translateY(-30px);
    }

    .fonts-loaded .rad-fade-down.rad-animate {
        animation-name: rad-fade-down;
        animation-duration: 1.1s;
    }

    @keyframes rad-fade-down {
        0% {
            opacity: 0;
            transform: translateY(-30px);
        }

        100% {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Scale Down animation triggering after font load or 3s timeout */
    .rad-scale-down {
        will-change: opacity, transform;
        animation-name: rad-scale-down-fallback;
        animation-duration: 5s;
        animation-fill-mode: both;
        transform-origin: 50% 0;
    }

    @keyframes rad-scale-down-fallback {
        0% {
            opacity: 0;
            transform: scaleY(0.95);
        }

        75% {
            opacity: 0;
            transform: scaleY(0.95);
        }

        100% {
            opacity: 1;
            transform: scaleY(1);
        }
    }

    .fonts-loaded .rad-scale-down.rad-waiting {
        animation-name: none;
        opacity: 0;
        transform: scaleY(0.95);
    }

    .fonts-loaded .rad-scale-down.rad-animate {
        animation-name: rad-scale-down;
        animation-duration: 1.1s;
        animation-fill-mode: both;
    }

    @keyframes rad-scale-down {
        0% {
            opacity: 0;
            transform: scaleY(0.95);
        }

        100% {
            opacity: 1;
            transform: scaleY(1);
        }
    }
</style>

<!-- Preload critical font -->
<link rel="preload" href="{{ "fonts/inter/Inter-Regular.woff2" | absURL }}" as="font" type="font/woff2" crossorigin/>
<link rel="preload" href="{{ "fonts/inter/Inter-SemiBold.woff2" | absURL }}" as="font" type="font/woff2" crossorigin/>

{{ range .Site.Params.plugins.css }}
<link rel="stylesheet" href="{{ .URL | absURL }}"/>
{{ end }}

<!-- Custom CSS overrides -->
<link rel="stylesheet" href="{{ "css/custom.css" | relURL }}?v={{ now.Unix }}"/>
<!-- Devicon for tech stack icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"/>

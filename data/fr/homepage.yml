# about
about:
  enable: true
  title: "Qui suis-je ?"
  icon: "icon-user-fill"
  content: |
    <p class="lead">
    Fort d'une formation en ingénierie biomédicale (UCLouvain, 2016), j'applique une approche analytique au développement web et logiciel. Je m'efforce de traduire des exigences complexes en applications accessibles et conviviales, qui équilibrent besoins techniques et design intuitif, avec un intérêt particulier pour les technologies de santé.
    </p>
    <p class="lead">
    Mon parcours inclut des travaux sur des plateformes de santé numérique dans le cadre de recherches à l'UCLouvain, la cofondation de la startup medtech MedC2 (acquise par la suite par Comunicare) axée sur l'autonomisation des patients, et l'accompagnement d'organisations à but non lucratif dans leur transformation numérique chez Bruxeo. En parallèle, à travers mon agence web Pwablo, j'explore et partage des approches durables des pratiques numériques.
    </p>
    <p class="lead">
    Je suis particulièrement attiré par les projets à l'intersection de la technologie et de l'impact social, où une ingénierie réfléchie peut améliorer de manière significative les résultats pour les utilisateurs et les organisations.
    </p>
  button:
    icon: "icon-smile-fill"
    btnText: "Voir mes projets"
    URL: "#client_and_work"
  image:
    x: "img/who-am-i/avatar_mini.webp"
    _2x: "img/who-am-i/avatar_mini.webp"
    original: "img/who-am-i/avatar_mini.webp"
    avif: "img/who-am-i/avatar_mini.webp"


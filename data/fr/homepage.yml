# about
about:
  enable: true
  title: "Qui suis-je ?"
  icon: "icon-user-fill"
  content: |
    <p class="lead">
    Ingénieur biomédical de formation (UCLouvain, 2016), j'applique une approche analytique au développement web et logiciel. Je m'efforce de traduire des exigences complexes en applications accessibles et intuitives, en équilibrant les besoins techniques avec une conception centrée sur l'utilisateur, avec un intérêt particulier pour la technologie en santé.
    </p>
    <p class="lead">
    Mon parcours comprend le développement de plateformes de santé numérique lors de recherches à l'UCLouvain, la cofondation de la startup medtech MedC2 (acquise par Comunicare) axée sur l'autonomisation des patients, et l'accompagnement de la transformation numérique d'organisations à but non lucratif chez Bruxeo. En parallèle, à travers mon agence web Pwablo, j'explore et partage des approches durables du numérique.
    </p>
    <p class="lead">
    Je suis particulièrement attiré par les projets à l'intersection de la technologie et de l'impact social, où une ingénierie réfléchie peut améliorer concrètement les résultats pour les utilisateurs et les organisations.
    </p>
  button:
    icon: "icon-smile-fill"
    btnText: "Voir mes projets"
    URL: "#client_and_work"
  image:
    x: "img/who-am-i/gustin-profile-bw.avif"
    _2x: "img/who-am-i/gustin-profile-bw.avif"
    original: "img/who-am-i/gustin-profile-bw.avif"
    avif: "img/who-am-i/gustin-profile-bw.avif"


<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" role="img" aria-label="VUB - Vrije Universiteit Brussel">
  <!-- Blue square background -->
  <rect x="0" y="10" width="100" height="100" fill="#003DA5"/>
  <!-- Orange triangle accent -->
  <polygon points="0,10 20,10 0,35" fill="#F07D00"/>
  <!-- VUB text in white -->
  <text x="8" y="82" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="white">VUB</text>
  <!-- Full name text -->
  <text x="115" y="45" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#003DA5">VRIJE</text>
  <text x="115" y="68" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#003DA5">UNIVERSITEIT</text>
  <text x="115" y="91" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#003DA5">BRUSSEL</text>
</svg>
